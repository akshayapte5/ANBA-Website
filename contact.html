<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ANBA After Wear</title>
    <!-- Global Head Components -->
    <script src="head-loader.js"></script>
</head>
<body class="antialiased selection:bg-odd-black selection:text-odd-white bg-odd-white text-odd-black">

    <!-- Header -->
    <section class="pt-40 pb-20 relative overflow-hidden bg-odd-white border-b border-odd-border">
        <div class="max-w-4xl mx-auto px-6 text-center z-10 w-full">
            <h1 class="font-display text-4xl md:text-6xl font-bold tracking-tighter mb-6 text-odd-black leading-none">
                <span class="reveal-text"><span class="mask-inner">Get in Touch</span></span>
            </h1>
            <p class="reveal text-lg text-odd-gray max-w-2xl mx-auto font-light leading-relaxed">
                We'd love to hear from you. Reach out about collaborations, orders, or just to say hello.
            </p>
        </div>
    </section>

    <!-- Contact Form -->
    <section class="py-32 bg-odd-offwhite">
        <div class="max-w-3xl mx-auto px-6">
            <div class="reveal bg-odd-white p-10 md:p-16 border border-odd-border shadow-2xl">
                <h3 class="text-2xl font-display font-bold text-odd-black mb-8">Send a Message</h3>
                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs tracking-widest uppercase font-bold text-odd-gray block">Name</label>
                            <input type="text" class="w-full bg-odd-offwhite border border-odd-border p-4 text-odd-black placeholder-odd-gray/50 focus:outline-none focus:border-odd-black transition-colors" placeholder="John Doe">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs tracking-widest uppercase font-bold text-odd-gray block">Email</label>
                            <input type="email" class="w-full bg-odd-offwhite border border-odd-border p-4 text-odd-black placeholder-odd-gray/50 focus:outline-none focus:border-odd-black transition-colors" placeholder="john@example.com">
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-xs tracking-widest uppercase font-bold text-odd-gray block">Subject</label>
                        <input type="text" class="w-full bg-odd-offwhite border border-odd-border p-4 text-odd-black placeholder-odd-gray/50 focus:outline-none focus:border-odd-black transition-colors" placeholder="Project Inquiry">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-xs tracking-widest uppercase font-bold text-odd-gray block">Message</label>
                        <textarea rows="6" class="w-full bg-odd-offwhite border border-odd-border p-4 text-odd-black placeholder-odd-gray/50 focus:outline-none focus:border-odd-black transition-colors resize-none" placeholder="Tell us about your project..."></textarea>
                    </div>
                    
                    <button type="submit" class="w-full bg-odd-black text-odd-white py-4 font-bold uppercase tracking-widest hover:bg-odd-gray transition-colors">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="content/global.js"></script>
    <script src="content-loader.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
